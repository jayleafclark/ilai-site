name = "ilai-lead"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

[vars]
# Origins allowed to POST the form (comma-separated).
ALLOW_ORIGINS = "https://ilaicollective.com,https://www.ilaicollective.com"

# Secrets are NOT set here. Set them after first deploy:
#   wrangler secret put SLACK_WEBHOOK      (required — Ilai Collective incoming webhook)
#   wrangler secret put RESEND_API_KEY     (optional — to also email leads)
#   wrangler secret put LEAD_TO            (optional — e.g. hello@ilaicollective.com)
#   wrangler secret put LEAD_FROM          (optional — verified Resend sender)
