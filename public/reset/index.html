<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Refreshing Ilai Collective…</title>
    <style>
      html,body{height:100%;margin:0}
      body{display:flex;align-items:center;justify-content:center;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:#123527;color:#e9f3ee}
      .box{text-align:center;padding:2rem}
      .dot{display:inline-block;width:9px;height:9px;border-radius:50%;
        background:#e6a9c4;margin:0 3px;animation:b 1s infinite alternate}
      .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
      @keyframes b{to{opacity:.25;transform:translateY(-4px)}}
      p{margin-top:1.1rem;font-size:.95rem;opacity:.8}
    </style>
  </head>
  <body>
    <div class="box">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <p>Loading the latest version…</p>
    </div>
    <script>
      (function () {
        function go() {
          // Unique query = guaranteed cache miss on the homepage.
          location.replace("/?fresh=" + Date.now());
        }
        var jobs = [];
        try {
          if (window.caches && caches.keys) {
            jobs.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).catch(function () {}));
          }
          if ("serviceWorker" in navigator) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }).catch(function () {}));
          }
        } catch (e) {}
        Promise.all(jobs).then(go).catch(go);
        setTimeout(go, 2500); // fallback if anything hangs
      })();
    </script>
  </body>
</html>
