name: Google Indexing API ping

# Notifies Google's Indexing API of all sitemap URLs so it (re)crawls sooner.
# Dormant until the GOOGLE_INDEXING_SA_KEY repo secret is set (the script
# no-ops without it). Runs weekly + on demand. Manually trigger it after a
# big content push via the Actions tab -> "Run workflow".

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1" # Mondays 15:00 UTC

permissions:
  contents: read

concurrency:
  group: google-index
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Submit sitemap URLs to the Google Indexing API
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
          SITEMAP_URL: https://ilaicollective.com/sitemap.xml
        run: node scripts/google-index.mjs
